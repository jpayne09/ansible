---
# Azure Dynamic Inventory Plugin
# AWX will use this to auto-discover Azure VMs in the resource group.
#
# In AWX: Create an Inventory → Add Source → "Sourced from a Project"
# Point to this file and attach Azure credentials.

plugin: azure.azcollection.azure_rm

auth_source: auto

include_vm_resource_groups:
  - "rg-simple-vm2"
  - "rg-ansible-lab"

plain_host_names: true

hostvar_expressions:
  public_ip_address: (public_ip_addresses | first).ip_address if public_ip_addresses else None
  private_ip_address: private_ip_addresses[0] if private_ip_addresses else None

keyed_groups:
  # Group by OS type
  - key: os_profile.system
    prefix: "os"
    separator: "_"
  # Group by location
  - key: location
    prefix: "region"
    separator: "_"
  # Group by tags
  - key: tags.Environment | default('untagged')
    prefix: "env"
    separator: "_"

conditional_groups:
  windows: "'windows' in (os_profile.system | default('') | lower)"
  linux: "'linux' in (os_profile.system | default('') | lower)"

compose:
  ansible_host: public_ip_addresses[0].ip_address if public_ip_addresses else private_ip_addresses[0]
  ansible_connection: "'winrm' if 'windows' in (os_profile.system | default('') | lower) else 'ssh'"
  ansible_user: "'azureuser' if 'windows' in (os_profile.system | default('') | lower) else 'ubuntu'"
  ansible_port: "5985 if 'windows' in (os_profile.system | default('') | lower) else 22"
