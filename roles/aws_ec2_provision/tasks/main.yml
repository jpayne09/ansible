---
# aws_ec2_provision - orchestrates networking + instance provisioning

- name: Create networking infrastructure
  ansible.builtin.include_tasks: networking.yml

- name: Create EC2 key pair
  amazon.aws.ec2_key:
    name: "{{ ec2_key_pair_name }}"
    region: "{{ aws_region }}"
    state: present
  register: key_result

- name: Save private key (first time only)
  ansible.builtin.copy:
    content: "{{ key_result.key.private_key }}"
    dest: "/tmp/{{ ec2_key_pair_name }}.pem"
    mode: "0600"
  when: key_result.key.private_key is defined

- name: Launch EC2 instances
  ansible.builtin.include_tasks: instance.yml
