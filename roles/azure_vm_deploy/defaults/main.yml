---
# Default variables for azure_vm_deploy role

# Azure Resource Group
azure_resource_group: "rg-ansible-vms"
azure_region: "eastus"

# VM Configuration
vm_name: "ansible-vm"
vm_size: "Standard_B2s"
vm_image_publisher: "Canonical"
vm_image_offer: "UbuntuServer"
vm_image_sku: "18.04-LTS"
vm_image_version: "latest"

# Network Configuration
virtual_network_name: "vnet-ansible"
subnet_name: "subnet-default"
network_interface_name: "nic-ansible"
security_group_name: "nsg-ansible"
public_ip_name: "pip-ansible"

# Storage Configuration
storage_account_name: "stoansible"
storage_account_type: "Standard_LRS"

# Tags
default_tags:
  Environment: "Development"
  ManagedBy: "Ansible"
  Project: "AzureVMTest"

# State
vm_state: "present"
