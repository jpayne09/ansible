---
# Cleanup playbook — destroys ALL resources created by the deploy playbooks.
# Use with caution! Best run from AWX with a survey confirmation step.
#
# Usage:
#   ansible-playbook playbooks/teardown_all.yml -e "confirm_destroy=yes"
#   ansible-playbook playbooks/teardown_all.yml -e "teardown_target=aws"
#   ansible-playbook playbooks/teardown_all.yml -e "teardown_target=azure"

- name: Teardown Lab Resources
  hosts: localhost
  gather_facts: false
  connection: local

  vars_files:
    - ../group_vars/Test-team/aws_ec2.yml
    - ../group_vars/Test-team/azure_vms.yml

  vars:
    confirm_destroy: "no"
    teardown_target: "all"  # all, aws, azure

  tasks:
    - name: Safety check - require explicit confirmation
      ansible.builtin.fail:
        msg: |
          SAFETY CHECK FAILED!
          You must pass -e "confirm_destroy=yes" to run this playbook.
          This will PERMANENTLY DELETE all lab resources.
      when: confirm_destroy != "yes"

    # ── AWS Teardown ──────────────────────────────────────────────────
    - name: "AWS: Terminate EC2 instances"
      amazon.aws.ec2_instance:
        state: absent
        region: "{{ aws_region }}"
        filters:
          "tag:ManagedBy": "ansible-awx"
          "tag:Project": "homelab-demo"
      when: teardown_target in ['all', 'aws']
      ignore_errors: true

    - name: "AWS: Delete security group"
      amazon.aws.ec2_security_group:
        name: "{{ aws_security_group_name }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_target in ['all', 'aws']
      ignore_errors: true

    - name: "AWS: Delete subnet"
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ aws_vpc_name }}"
        cidr: "{{ aws_subnet_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_target in ['all', 'aws']
      ignore_errors: true

    - name: "AWS: Delete internet gateway"
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ aws_vpc_name }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_target in ['all', 'aws']
      ignore_errors: true

    - name: "AWS: Delete VPC"
      amazon.aws.ec2_vpc_net:
        name: "{{ aws_vpc_name }}"
        cidr_block: "{{ aws_vpc_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_target in ['all', 'aws']
      ignore_errors: true

    - name: "AWS: Delete key pair"
      amazon.aws.ec2_key:
        name: "{{ ec2_key_pair_name }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_target in ['all', 'aws']
      ignore_errors: true

    # ── Azure Teardown ────────────────────────────────────────────────
    - name: "Azure: Delete resource group (cascades all resources)"
      azure.azcollection.azure_rm_resourcegroup:
        subscription_id: "{{ azure_subscription_id }}"
        name: "{{ azure_resource_group }}"
        state: absent
        force_delete_nonempty: true
      when: teardown_target in ['all', 'azure']
      ignore_errors: true

    # ── Summary ───────────────────────────────────────────────────────
    - name: Teardown summary
      ansible.builtin.debug:
        msg: |
          ✓ Teardown Complete (target: {{ teardown_target }})

          AWS resources destroyed:
            - EC2 instances (tagged ManagedBy=ansible-awx)
            - Security group: {{ aws_security_group_name }}
            - VPC: {{ aws_vpc_name }} ({{ aws_vpc_cidr }})
            - Key pair: {{ ec2_key_pair_name }}

          Azure resources destroyed:
            - Resource group: {{ azure_resource_group }} (all nested resources)

          Note: Some deletions may have been skipped if resources didn't exist.
