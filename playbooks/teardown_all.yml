---
# Teardown ALL lab resources (AWS + Azure)
#
# Usage:
#   ansible-playbook playbooks/teardown_all.yml -e "confirm_destroy=yes"
#
# To teardown only one provider, use the individual playbooks:
#   ansible-playbook playbooks/teardown_aws.yml -e "confirm_destroy=yes"
#   ansible-playbook playbooks/teardown_azure.yml -e "confirm_destroy=yes"

- name: Teardown AWS Resources
  ansible.builtin.import_playbook: teardown_aws.yml

- name: Teardown Azure Resources
  ansible.builtin.import_playbook: teardown_azure.yml
