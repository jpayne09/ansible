---
# Teardown AWS resources created by aws_deploy_ec2.yml
#
# Usage:
#   ansible-playbook playbooks/teardown_aws.yml -e "confirm_destroy=yes"

- name: Teardown AWS Resources
  hosts: localhost
  gather_facts: false
  connection: local

  vars_files:
    - ../group_vars/Test-team/aws_ec2.yml

  vars:
    confirm_destroy: "yes"

  tasks:
    - name: Safety check - require explicit confirmation
      ansible.builtin.fail:
        msg: |
          SAFETY CHECK FAILED!
          You must pass -e "confirm_destroy=yes" to run this playbook.
          This will PERMANENTLY DELETE all AWS lab resources.
      when: confirm_destroy != "yes"

    - name: Terminate EC2 instances
      amazon.aws.ec2_instance:
        state: absent
        region: "{{ aws_region }}"
        filters:
          "tag:ManagedBy": "ansible-awx"
          "tag:Project": "homelab-demo"
      ignore_errors: true

    - name: Look up VPC by name
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Name": "{{ aws_vpc_name }}"
      register: vpc_lookup
      ignore_errors: true

    - name: Set VPC ID fact
      ansible.builtin.set_fact:
        teardown_vpc_id: "{{ vpc_lookup.vpcs[0].id }}"
      when: vpc_lookup.vpcs | default([]) | length > 0

    - name: Delete security group
      amazon.aws.ec2_security_group:
        name: "{{ aws_security_group_name }}"
        region: "{{ aws_region }}"
        vpc_id: "{{ teardown_vpc_id }}"
        state: absent
      when: teardown_vpc_id is defined
      ignore_errors: true

    - name: Delete route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ teardown_vpc_id }}"
        region: "{{ aws_region }}"
        tags:
          Name: "{{ aws_route_table_name }}"
        lookup: tag
        state: absent
      when: teardown_vpc_id is defined
      ignore_errors: true

    - name: Delete subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ teardown_vpc_id }}"
        cidr: "{{ aws_subnet_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_vpc_id is defined
      ignore_errors: true

    - name: Delete internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ teardown_vpc_id }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_vpc_id is defined
      ignore_errors: true

    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ aws_vpc_name }}"
        cidr_block: "{{ aws_vpc_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when: teardown_vpc_id is defined
      ignore_errors: true

    - name: Delete key pair
      amazon.aws.ec2_key:
        name: "{{ ec2_key_pair_name }}"
        region: "{{ aws_region }}"
        state: absent
      ignore_errors: true

    - name: Teardown summary
      ansible.builtin.debug:
        msg: |
          AWS Teardown Complete

          Resources destroyed:
            - EC2 instances (tagged ManagedBy=ansible-awx)
            - Security group: {{ aws_security_group_name }}
            - Route table: {{ aws_route_table_name }}
            - Subnet: {{ aws_subnet_cidr }}
            - Internet gateway
            - VPC: {{ aws_vpc_name }} ({{ aws_vpc_cidr }})
            - Key pair: {{ ec2_key_pair_name }}

          Note: Some deletions may have been skipped if resources didn't exist.
