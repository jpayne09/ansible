---
# Playbook to deploy Azure VMs using Ansible

- name: Deploy Azure IaaS VMs
  hosts: localhost
  gather_facts: yes
  
  vars_files:
    - ../group_vars/azure_vms.yml
  
  vars:
    # Can be overridden via command line
    deployment_environment: "dev"
  
  tasks:
    - name: Display deployment configuration
      debug:
        msg: |
          Deploying Azure VMs with the following configuration:
          - Environment: {{ deployment_environment }}
          - Resource Group: {{ azure_resource_group }}
          - Region: {{ azure_region }}
          - VM Size: {{ vm_size }}
    
    - name: Load Azure credentials from config
      set_fact:
        azure_config: "{{ lookup('file', '../configs/azure_credentials.yml') | from_yaml }}"
      ignore_errors: yes
      when: deployment_environment == "prod"
    
    - name: Set Azure facts
      set_fact:
        resource_prefix: "{{ deployment_environment }}-ansible"
  
  roles:
    - role: azure_vm_deploy
      vars:
        vm_name: "{{ resource_prefix }}-vm-01"
        azure_resource_group: "rg-{{ resource_prefix }}"
        default_tags:
          Environment: "{{ deployment_environment }}"
          ManagedBy: "Ansible"
          Project: "AzureVMTest"
          DeploymentDate: "{{ ansible_date_time.iso8601 }}"
