---
# Deploy AWS EC2 Instances (Multi-Instance, Multi-Volume, STS Support)
#
# Supports:
#   - STS assume role (set aws_use_sts: true + aws_sts_role_arn)
#   - Direct credentials / instance profile (default)
#   - Multi-instance deployment via ec2_instances list
#   - Multiple EBS volumes per instance
#   - Windows and Linux user_data templates
#
# Usage:
#   # Dev environment (direct creds):
#   ansible-playbook playbooks/aws_deploy_ec2.yml -i inventories/dev/hosts.yml
#
#   # Prod environment with STS:
#   ansible-playbook playbooks/aws_deploy_ec2.yml -i inventories/prod/hosts.yml \
#     -e "aws_use_sts=true aws_sts_role_arn=arn:aws:iam::123456789012:role/AnsibleDeploy"
#
#   # AWX: Select inventory + credentials via Job Template

- name: Deploy AWS EC2 Instances
  hosts: localhost
  gather_facts: false
  connection: local

  # ── STS Assume Role (conditional) ──────────────────────────────────
  pre_tasks:
    - name: Assume AWS STS role
      amazon.aws.sts_assume_role:
        role_arn: "{{ aws_sts_role_arn }}"
        role_session_name: "{{ aws_sts_session_name }}"
        duration_seconds: "{{ aws_sts_duration_seconds }}"
        external_id: "{{ aws_sts_external_id | default(omit, true) }}"
        region: "{{ aws_region }}"
      register: sts_creds
      when: aws_use_sts | bool

    - name: Set STS credential facts
      ansible.builtin.set_fact:
        _aws_access_key: "{{ sts_creds.sts_creds.access_key }}"
        _aws_secret_key: "{{ sts_creds.sts_creds.secret_key }}"
        _aws_session_token: "{{ sts_creds.sts_creds.session_token }}"
      when: aws_use_sts | bool
      no_log: true

    - name: Display deployment parameters
      ansible.builtin.debug:
        msg: |
          Region: {{ aws_region }}
          STS Mode: {{ aws_use_sts | default(false) }}
          Instances to deploy: {{ ec2_instances | length }}
          {% for inst in ec2_instances %}
          - {{ inst.name }} ({{ inst.os_type }}, {{ inst.instance_type }}, {{ inst.volumes | length }} volumes)
          {% endfor %}

  # ── Pass STS creds to all AWS modules automatically ────────────────
  module_defaults:
    group/amazon.aws.aws:
      region: "{{ aws_region }}"
      access_key: "{{ _aws_access_key | default(omit) }}"
      secret_key: "{{ _aws_secret_key | default(omit) }}"
      session_token: "{{ _aws_session_token | default(omit) }}"

  # ── Main Deployment ────────────────────────────────────────────────
  roles:
    - role: aws_ec2_provision

  # ── Post-Launch ────────────────────────────────────────────────────
  tasks:
    - name: Deployment summary
      ansible.builtin.debug:
        msg: |
          AWS EC2 Deployment Complete!

          VPC: {{ vpc_result.vpc.id }} ({{ aws_vpc_cidr }})
          Subnet: {{ subnet_result.subnet.id }}
          Security Group: {{ sg_result.group_id }}

          Instances:
          {% for result in ec2_launch_results.results %}
          - {{ result.item.name }}:
              Instance ID: {{ result.instances[0].instance_id }}
              Public IP: {{ result.instances[0].public_ip_address }}
              Private IP: {{ result.instances[0].private_ip_address }}
              OS Type: {{ result.item.os_type }}
              Volumes: {{ result.item.volumes | length }}
          {% endfor %}

          Connect:
          {% for result in ec2_launch_results.results %}
          {% if result.item.os_type == 'windows' %}
            {{ result.item.name }}: RDP → {{ result.instances[0].public_ip_address }}:3389 | WinRM → :5985
          {% else %}
            {{ result.item.name }}: SSH → {{ result.instances[0].public_ip_address }}:22
          {% endif %}
          {% endfor %}
