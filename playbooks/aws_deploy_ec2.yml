---
- name: Deploy AWS EC2 Windows Server
  hosts: localhost
  gather_facts: false
  connection: local

  vars_files:
    - ../group_vars/aws_ec2.yml

  tasks:
    - name: Debug - Verify AWS credentials loaded
      ansible.builtin.debug:
        msg: |
          Region: {{ aws_region }}
          Instance Type: {{ ec2_instance_type }}
          AMI: {{ ec2_ami_id }}
          Key Pair: {{ ec2_key_pair_name }}

    # ── VPC & Networking ──────────────────────────────────────────────
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ aws_vpc_name }}"
        cidr_block: "{{ aws_vpc_cidr }}"
        region: "{{ aws_region }}"
        state: present
        tags: "{{ ec2_tags }}"
      register: vpc_result

    - name: Create subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc_result.vpc.id }}"
        cidr: "{{ aws_subnet_cidr }}"
        region: "{{ aws_region }}"
        az: "{{ aws_region }}a"
        map_public: true
        state: present
        tags: "{{ ec2_tags | combine({'Name': aws_subnet_name}) }}"
      register: subnet_result

    - name: Create internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc_result.vpc.id }}"
        region: "{{ aws_region }}"
        state: present
        tags: "{{ ec2_tags | combine({'Name': aws_igw_name}) }}"
      register: igw_result

    - name: Create route table with internet access
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc_result.vpc.id }}"
        region: "{{ aws_region }}"
        subnets:
          - "{{ subnet_result.subnet.id }}"
        routes:
          - dest: "0.0.0.0/0"
            gateway_id: "{{ igw_result.gateway_id }}"
        tags: "{{ ec2_tags | combine({'Name': aws_route_table_name}) }}"
      register: route_table_result

    # ── Security Group ────────────────────────────────────────────────
    - name: Create security group
      amazon.aws.ec2_security_group:
        name: "{{ aws_security_group_name }}"
        description: "Ansible Lab - RDP, WinRM, SSH access"
        vpc_id: "{{ vpc_result.vpc.id }}"
        region: "{{ aws_region }}"
        rules:
          - proto: tcp
            from_port: 3389
            to_port: 3389
            cidr_ip: "0.0.0.0/0"
            rule_desc: "RDP"
          - proto: tcp
            from_port: 5985
            to_port: 5986
            cidr_ip: "0.0.0.0/0"
            rule_desc: "WinRM HTTP/HTTPS"
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: "0.0.0.0/0"
            rule_desc: "SSH"
        tags: "{{ ec2_tags }}"
      register: sg_result

    # ── EC2 Key Pair ──────────────────────────────────────────────────
    - name: Create EC2 key pair (if not exists)
      amazon.aws.ec2_key:
        name: "{{ ec2_key_pair_name }}"
        region: "{{ aws_region }}"
        state: present
      register: key_result

    - name: Save private key (first time only)
      ansible.builtin.copy:
        content: "{{ key_result.key.private_key }}"
        dest: "/tmp/{{ ec2_key_pair_name }}.pem"
        mode: "0600"
      when: key_result.key.private_key is defined

    # ── Windows EC2 Instance ──────────────────────────────────────────
    - name: Launch Windows EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ ec2_instance_name }}"
        instance_type: "{{ ec2_instance_type }}"
        image_id: "{{ ec2_ami_id }}"
        key_name: "{{ ec2_key_pair_name }}"
        region: "{{ aws_region }}"
        vpc_subnet_id: "{{ subnet_result.subnet.id }}"
        security_group: "{{ sg_result.group_id }}"
        network:
          assign_public_ip: true
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: "{{ ec2_root_volume_size }}"
              volume_type: gp3
              delete_on_termination: true
        user_data: |
          <powershell>
          # Enable WinRM for Ansible
          Set-ExecutionPolicy Unrestricted -Force
          winrm quickconfig -q
          winrm set winrm/config/service '@{AllowUnencrypted="true"}'
          winrm set winrm/config/service/auth '@{Basic="true"}'
          winrm set winrm/config/winrs '@{MaxMemoryPerShellMB="1024"}'
          New-NetFirewallRule -DisplayName "WinRM HTTP" -Direction Inbound -LocalPort 5985 -Protocol TCP -Action Allow
          # Set Administrator password
          net user Administrator '{{ ec2_win_admin_password }}' /active:yes
          </powershell>
        state: running
        wait: true
        tags: "{{ ec2_tags | combine({'Name': ec2_instance_name, 'OS': 'Windows'}) }}"
      register: ec2_win_result

    - name: Wait for Windows instance to be reachable (WinRM)
      ansible.builtin.wait_for:
        host: "{{ ec2_win_result.instances[0].public_ip_address }}"
        port: 5985
        delay: 60
        timeout: 600
        state: started

    # ── Output ────────────────────────────────────────────────────────
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ✓ AWS EC2 Deployment Complete!

          VPC: {{ vpc_result.vpc.id }} ({{ aws_vpc_cidr }})
          Subnet: {{ subnet_result.subnet.id }}
          Security Group: {{ sg_result.group_id }}

          Windows Instance:
            Instance ID: {{ ec2_win_result.instances[0].instance_id }}
            Public IP: {{ ec2_win_result.instances[0].public_ip_address }}
            Private IP: {{ ec2_win_result.instances[0].private_ip_address }}
            RDP: {{ ec2_win_result.instances[0].public_ip_address }}:3389
            WinRM: {{ ec2_win_result.instances[0].public_ip_address }}:5985
            Username: {{ ec2_win_admin_user }}

    - name: Add Windows instance to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ ec2_win_result.instances[0].public_ip_address }}"
        groups: aws_windows
        ansible_host: "{{ ec2_win_result.instances[0].public_ip_address }}"
        ansible_user: "{{ ec2_win_admin_user }}"
        ansible_password: "{{ ec2_win_admin_password }}"
        ansible_connection: winrm
        ansible_winrm_transport: basic
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5985
