---
- name: Deploy Simple Azure VM
  hosts: localhost
  gather_facts: false
  
  vars_files:
    - group_vars/azure_vms.yml
  
  tasks:
    - name: Debug - Check credentials loaded from Tower
      debug:
        msg: |
          Subscription ID: {{ azure_subscription_id | default('NOT SET') }}
          Client ID: {{ azure_client_id | default('NOT SET') }}
          Tenant ID: {{ azure_tenant_id | default('NOT SET') }}

    - name: Create resource group
      azure.azcollection.azure_rm_resourcegroup:
        name: "{{ azure_resource_group }}"
        location: "{{ azure_region }}"
      register: rg_result

    - name: Create virtual network
      azure.azcollection.azure_rm_virtualnetwork:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ virtual_network_name }}"
        address_prefixes_cidr:
          - "10.0.0.0/16"

    - name: Create subnet
      azure.azcollection.azure_rm_subnet:
        resource_group: "{{ azure_resource_group }}"
        virtual_network_name: "{{ virtual_network_name }}"
        name: "{{ subnet_name }}"
        address_prefix_cidr: "10.0.1.0/24"

    - name: Create network security group
      azure.azcollection.azure_rm_securitygroup:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ nsg_name }}"
        rules:
          - name: AllowRDP
            protocol: Tcp
            destination_port_range: 3389
            access: Allow
            priority: 100
            direction: Inbound
          - name: AllowWinRM
            protocol: Tcp
            destination_port_range: 5985
            access: Allow
            priority: 101
            direction: Inbound

    - name: Create public IP address
      azure.azcollection.azure_rm_publicipaddress:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ public_ip_name }}"
        allocation_method: "Static"
      register: public_ip

    - name: Create network interface
      azure.azcollection.azure_rm_networkinterface:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ nic_name }}"
        virtual_network_name: "{{ virtual_network_name }}"
        subnet_name: "{{ subnet_name }}"
        security_group_name: "{{ nsg_name }}"
        ip_configurations:
          - name: ipconfig1
            private_ip_allocation_method: "Dynamic"
            public_ip_address_name: "{{ public_ip_name }}"
            primary: true

    - name: Create virtual machine
      azure.azcollection.azure_rm_virtualmachine:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ vm_name }}"
        vm_size: "{{ vm_size }}"
        admin_username: "{{ vm_admin_user }}"
        admin_password: "{{ vm_admin_password }}"
        network_interfaces: "{{ nic_name }}"
        os_type: Windows
        image:
          offer: "{{ vm_image_offer }}"
          publisher: "{{ vm_image_publisher }}"
          sku: "{{ vm_image_sku }}"
          version: "{{ vm_image_version }}"
        os_disk_size_gb: "{{ vm_os_disk_size_gb }}"
        managed_disk_type: "Premium_LRS"
      register: vm_result

    - name: Get VM public IP
      azure.azcollection.azure_rm_publicipaddress_info:
        resource_group: "{{ azure_resource_group }}"
        name: "{{ public_ip_name }}"
      register: public_ip_info

    - name: Display VM information
      debug:
        msg: |
          ✓ Windows VM Deployment Complete!
          
          Resource Group: {{ azure_resource_group }}
          VM Name: {{ vm_name }}
          Location: {{ azure_region }}
          Size: {{ vm_size }}
          Admin User: {{ vm_admin_user }}
          Public IP: {{ public_ip_info.publicipaddresses[0].ip_address }}
          
          To connect to the VM:
          - RDP: Connect to {{ public_ip_info.publicipaddresses[0].ip_address }}:3389
          - Username: {{ vm_admin_user }}
          - Password: (as configured)
          - RDP: Connect to <PUBLIC_IP>:3389 with username {{ vm_admin_user }} and password {{ vm_admin_password }}
