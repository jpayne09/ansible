---
# Credential reference patterns
#
# Actual values come from (in priority order):
#   1. AWX credential injection (env vars) - preferred for production
#   2. Ansible Vault encrypted values (vault_* prefix)
#   3. Extra vars at runtime (-e or AWX survey)
#
# NEVER put actual secrets in this file.
#
# AWS credentials:
#   - Injected by AWX "Amazon Web Services" credential type
#   - aws_access_key / aws_secret_key come from env vars
#   - For STS: set aws_sts_role_arn via extra vars or vault
#
# Azure credentials:
#   - Injected by AWX "Microsoft Azure Resource Manager" credential type
#   - azure_client_id, azure_client_secret, azure_tenant_id, azure_subscription_id
#
# Vault example (encrypt with: ansible-vault encrypt_string):
#   vault_ec2_win_admin_password: !vault |
#     $ANSIBLE_VAULT;1.2;AES256;...
