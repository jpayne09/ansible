---
# Azure defaults - base configuration inherited by all environments

# Credentials - injected by AWX Microsoft Azure RM credential type
azure_client_id: "{{ lookup('env', 'AZURE_CLIENT_ID') }}"
azure_client_secret: "{{ lookup('env', 'AZURE_CLIENT_SECRET') }}"
azure_tenant_id: "{{ lookup('env', 'AZURE_TENANT_ID') }}"
azure_subscription_id: "{{ override_azure_subscription_id | default(lookup('env', 'AZURE_SUBSCRIPTION_ID')) }}"

# Resource configuration
azure_resource_group: "rg-simple-vm2"
azure_region: "eastus2"

# VM defaults
vm_name: "JPTEST784hj"
vm_size: "Standard_D2s_v3"
vm_admin_user: "azureuser"
vm_admin_password: "{{ vault_azure_vm_admin_password | default('P@ssw0rd1234!') }}"
vm_os_disk_size_gb: 128

# Image defaults
vm_image_publisher: "MicrosoftWindowsServer"
vm_image_offer: "WindowsServer"
vm_image_sku: "2022-Datacenter"
vm_image_version: "latest"

# Network defaults
virtual_network_name: "vnet-simple"
subnet_name: "subnet-default"
nsg_name: "nsg-simple"
public_ip_name: "pip-simple-vm"
nic_name: "nic-simple-vm"
