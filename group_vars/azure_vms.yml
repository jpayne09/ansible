---
# Azure Credentials - Tower injects these automatically
# If running locally, falls back to environment or file
azure_subscription_id: "{{ lookup('env', 'AZURE_SUBSCRIPTION_ID') }}"
azure_client_id: "{{ lookup('env', 'AZURE_CLIENT_ID') }}"
azure_client_secret: "{{ lookup('env', 'AZURE_CLIENT_SECRET') }}"
azure_tenant_id: "{{ lookup('env', 'AZURE_TENANT_ID') }}"

# Azure Resource Configuration
azure_resource_group: "rg-simple-vm"
azure_region: "eastus"

# Virtual Machine Configuration
vm_name: "simple-vmfffff"
vm_size: "Standard_B2s"
vm_admin_user: "azureuser"
vm_admin_password: "P@ssw0rd1234!"
vm_os_disk_size_gb: 30

# VM Image Configuration
vm_image_publisher: "MicrosoftWindowsServer"
vm_image_offer: "WindowsServer"
vm_image_sku: "2022-Datacenter"
vm_image_version: "latest"

# Network Configuration
virtual_network_name: "vnet-simple"
subnet_name: "subnet-default"
nsg_name: "nsg-simple"
public_ip_name: "pip-simple-vm"
nic_name: "nic-simple-vm"

# Ansible settings
# NOTE: WinRM is only for connecting to deployed Windows VMs
# Local execution uses SSH/shell
