---
# AWS EC2 Dynamic Inventory Plugin - Dev Environment
plugin: amazon.aws.ec2

regions:
  - us-east-1

filters:
  "tag:ManagedBy":
    - "ansible-awx"
  "tag:Project":
    - "homelab-demo"
  "tag:Environment":
    - "dev"
  instance-state-name:
    - running

keyed_groups:
  - key: tags.OS
    prefix: "os"
    separator: "_"
  - key: tags.Environment
    prefix: "env"
    separator: "_"

hostnames:
  - public-ip-address
  - private-ip-address

compose:
  ansible_host: public_ip_address
  ansible_connection: "'winrm' if tags.get('OS', '') == 'Windows' else 'ssh'"
  ansible_user: "'Administrator' if tags.get('OS', '') == 'Windows' else 'ec2-user'"
  ansible_port: "5985 if tags.get('OS', '') == 'Windows' else 22"
  ansible_winrm_transport: "'basic' if tags.get('OS', '') == 'Windows' else omit"
  ansible_winrm_server_cert_validation: "'ignore' if tags.get('OS', '') == 'Windows' else omit"
