---
# Dev AWS overrides
aws_region: "us-east-1"
aws_vpc_cidr: "10.10.0.0/16"
aws_subnet_cidr: "10.10.1.0/24"

# Dev uses smaller/cheaper instances
ec2_instances:
  - name: "dev-win-01"
    os_type: windows
    instance_type: "t3.micro"
    ami_id: "ami-031283482dcfced88"       # Windows Server 2025 (us-east-1)
    key_pair: "{{ ec2_key_pair_name }}"
    volumes:
      - device_name: "/dev/sda1"
        ebs:
          volume_size: 50
          volume_type: gp3
          delete_on_termination: true
          encrypted: true
      - device_name: "xvdf"
        ebs:
          volume_size: 20
          volume_type: gp3
          delete_on_termination: true
          encrypted: true
    user_data_template: "windows_userdata.ps1.j2"
    admin_user: "{{ ec2_win_admin_user }}"
    admin_password: "{{ ec2_win_admin_password }}"
    extra_tags:
      OS: "Windows"
      Team: "dev"

  - name: "dev-linux-01"
    os_type: linux
    instance_type: "t3.micro"
    ami_id: "ami-0f3caa1cf4417e51b"       # Amazon Linux (us-east-1)
    key_pair: "{{ ec2_key_pair_name }}"
    volumes:
      - device_name: "/dev/xvda"
        ebs:
          volume_size: 20
          volume_type: gp3
          delete_on_termination: true
          encrypted: true
      - device_name: "/dev/xvdf"
        ebs:
          volume_size: 20
          volume_type: gp3
          delete_on_termination: true
          encrypted: true
    user_data_template: "linux_userdata.sh.j2"
    admin_user: "ec2-user"
    extra_tags:
      OS: "Linux"
      Team: "dev"
