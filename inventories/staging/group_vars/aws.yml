---
# Staging AWS overrides
aws_region: "us-east-1"
aws_vpc_cidr: "10.20.0.0/16"
aws_subnet_cidr: "10.20.1.0/24"

# Staging mirrors prod instance types but with fewer instances
ec2_instances:
  - name: "staging-win-01"
    os_type: windows
    instance_type: "t3.medium"
    ami_id: "ami-031283482dcfced88"
    key_pair: "{{ ec2_key_pair_name }}"
    volumes:
      - device_name: "/dev/sda1"
        ebs:
          volume_size: 50
          volume_type: gp3
          delete_on_termination: true
          encrypted: true
      - device_name: "xvdf"
        ebs:
          volume_size: 50
          volume_type: gp3
          delete_on_termination: true
          encrypted: true
    user_data_template: "windows_userdata.ps1.j2"
    admin_user: "{{ ec2_win_admin_user }}"
    admin_password: "{{ ec2_win_admin_password }}"
    extra_tags:
      OS: "Windows"
      Team: "staging"

  - name: "staging-linux-01"
    os_type: linux
    instance_type: "t3.small"
    ami_id: "ami-0f3caa1cf4417e51b"
    key_pair: "{{ ec2_key_pair_name }}"
    volumes:
      - device_name: "/dev/xvda"
        ebs:
          volume_size: 30
          volume_type: gp3
          delete_on_termination: true
          encrypted: true
      - device_name: "/dev/xvdf"
        ebs:
          volume_size: 50
          volume_type: gp3
          delete_on_termination: true
          encrypted: true
    user_data_template: "linux_userdata.sh.j2"
    admin_user: "ec2-user"
    extra_tags:
      OS: "Linux"
      Team: "staging"
